name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - name: Install exact NSIS
        shell: pwsh
        run: |
          choco install nsis --version=3.12 -y --no-progress
          $version = (& "$env:ProgramFiles(x86)\NSIS\makensis.exe" /VERSION | Select-Object -First 1).Trim()
          if ($version -notmatch '^v?3\.12(?:\.0)?$') { throw "Unexpected NSIS version: $version" }
      - name: Build release artifacts
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          $env:RELEASE_VERSION = $env:RELEASE_VERSION.TrimStart('v')
          .\scripts\build-release.ps1
      - name: Sign installer when certificate exists
        if: ${{ env.WINDOWS_CERTIFICATE_BASE64 != '' }}
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Filter signtool.exe -Recurse |
            Where-Object FullName -Match '\\x64\\' | Select-Object -First 1
          & $signtool.FullName sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD artifacts\publish\win-x64\CodexQuotaRail.App.exe
          $version = '${{ github.ref_name }}'.TrimStart('v')
          & "$env:ProgramFiles(x86)\NSIS\makensis.exe" "/DVERSION=$version" "/DPUBLISH_DIR=$pwd\artifacts\publish\win-x64" "/DARTIFACT_DIR=$pwd\artifacts" packaging\nsis\CodexQuotaRail.nsi
          & $signtool.FullName sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD artifacts\CodexQuotaRail-Setup.exe
          Compress-Archive artifacts\publish\win-x64\* artifacts\CodexQuotaRail-win-x64.zip -Force
          Move-Item artifacts\CodexQuotaRail-Setup.exe artifacts\CodexQuotaRail-Setup-signed.exe
          Move-Item artifacts\CodexQuotaRail-win-x64.zip artifacts\CodexQuotaRail-win-x64-signed.zip
      - name: Mark unsigned outputs explicitly
        if: ${{ env.WINDOWS_CERTIFICATE_BASE64 == '' }}
        shell: pwsh
        run: |
          Move-Item artifacts\CodexQuotaRail-Setup.exe artifacts\CodexQuotaRail-Setup-unsigned.exe
          Move-Item artifacts\CodexQuotaRail-win-x64.zip artifacts\CodexQuotaRail-win-x64-unsigned.zip
      - name: Regenerate hashes after signing and renaming
        shell: pwsh
        run: |
          Get-FileHash artifacts\CodexQuotaRail-*.zip, artifacts\CodexQuotaRail-Setup-*.exe, artifacts\CodexQuotaRail.spdx.json, artifacts\THIRD-PARTY-NOTICES.md -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content artifacts\SHA256SUMS.txt -Encoding ascii
      - name: Create public GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            artifacts/CodexQuotaRail-*.zip
            artifacts/CodexQuotaRail-Setup-*.exe
            artifacts/SHA256SUMS.txt
            artifacts/CodexQuotaRail.spdx.json
            artifacts/THIRD-PARTY-NOTICES.md
