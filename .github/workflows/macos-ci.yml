name: macOS CI

on:
  push:
    branches: [main, feature/codex-quota-rail]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift toolchain
        run: swift --version
      - name: Test CodexQuotaKit
        run: swift test --package-path macos/Packages/CodexQuotaKit
      - name: Build Universal app
        run: bash macos/Scripts/build-universal.sh 0.1.0-ci.${{ github.run_number }}
      - name: Verify archive
        run: |
          ditto -x -k artifacts/macos/CodexQuotaRail-macOS-universal.app.zip artifacts/macos/unpacked
          bash macos/Scripts/verify-app.sh artifacts/macos/unpacked/CodexQuotaRailMac.app
          cd artifacts/macos
          shasum -a 256 -c SHA256SUMS.txt
      - name: Smoke test preview and capture UI
        run: |
          APP="artifacts/macos/unpacked/CodexQuotaRailMac.app"
          LOG="artifacts/macos/rail-preview.log"
          "$APP/Contents/MacOS/CodexQuotaRailMac" --rail-preview >"$LOG" 2>&1 &
          PID=$!
          cleanup() {
            kill "$PID" 2>/dev/null || true
            wait "$PID" 2>/dev/null || true
          }
          trap cleanup EXIT
          sleep 4
          kill -0 "$PID"
          screencapture -x artifacts/macos/rail-preview.png
          test -s artifacts/macos/rail-preview.png
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexQuotaRail-macOS-universal
          path: |
            artifacts/macos/CodexQuotaRail-macOS-universal.app.zip
            artifacts/macos/SHA256SUMS.txt
            artifacts/macos/VERSION.txt
            artifacts/macos/rail-preview.png
            artifacts/macos/rail-preview.log
